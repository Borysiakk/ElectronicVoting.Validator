      rabbitmq_a:
        condition: service_healthy

    networks:
      - voting-net

  validator-db-a:
    image: postgres:16
    container_name: validator-db-a
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=validator-db-a
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d election" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - voting-net
        
  election-db:
    image: postgres:16
    restart: always
    container_name: election-db
    environment:
      POSTGRES_DB: election
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d election" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - voting-net

  rabbitmq_a:
    image: rabbitmq:3-management
    container_name: rabbitmq_a
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - ~/.docker-conf/rabbitmq/data/:/var/lib/rabbitmq/
      - ~/.docker-conf/rabbitmq/log/:/var/log/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - voting-net
        
