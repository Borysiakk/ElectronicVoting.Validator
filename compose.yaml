      rabbitmq_b:
        condition: service_healthy
    networks:
      - voting-net

  validator-db-b:
    image: postgres:16
    container_name: validator-db-b
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=validator-db-b 
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d election" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - voting-net
      
  rabbitmq_b:
    image: rabbitmq:3-management
    container_name: rabbitmq_b
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - ~/.docker-conf/rabbitmq/data/:/var/lib/rabbitmq/
      - ~/.docker-conf/rabbitmq/log/:/var/log/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - voting-net
      
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "MINIO_ACCESS_KEY"       
      MINIO_ROOT_PASSWORD: "MINIO_SECRET_KEY"   
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - voting-net

networks:
  voting-net:
    external: true
    
volumes:
  minio_data:
